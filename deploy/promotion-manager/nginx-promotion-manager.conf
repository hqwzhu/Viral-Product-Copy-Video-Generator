# Include inside the existing www.enhe-tech.com.cn HTTPS server block.
# The API runs on localhost only and is isolated under /api/promotion-manager/
# plus lightweight product/billing/status pages under /promotion-manager/.

client_max_body_size 2m;

location ^~ /api/promotion-manager/ {
    proxy_pass http://127.0.0.1:3030;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
}

location ^~ /promotion-manager/checkout {
    proxy_pass http://127.0.0.1:3030;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
}

location ^~ /promotion-manager/billing {
    proxy_pass http://127.0.0.1:3030;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
}

# Public legal/support pages:
# /promotion-manager/privacy
# /promotion-manager/terms
# /promotion-manager/refund
# /promotion-manager/support
location ~ ^/promotion-manager/(privacy|terms|refund|support)$ {
    proxy_pass http://127.0.0.1:3030;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
}

location ^~ /promotion-manager/runs/ {
    proxy_pass http://127.0.0.1:3030;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
}
